version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: water_delivery_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: Pass123!
      MYSQL_DATABASE: water_delivery_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      # Automatically initialize database tables and seed admin on first container start
      - ./backend/src/config/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: water_delivery_app
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - DB_HOST=db
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=Pass123!
      - DB_NAME=water_delivery_db
      - JWT_SECRET=prod_secret_jwt_key_12345
      - NODE_ENV=production
    depends_on:
      - db

volumes:
  mysql_data:
